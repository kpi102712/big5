<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 성격 아키타입 찾기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7;
            --e-color: #fbbf24; --i-color: #60a5fa;
            --s-color: #34d399; --n-color: #f87171;
        }
        body { font-family: 'Pretendard', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        
        .q-card { background: white; padding: 30px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; display: block; line-height: 1.6; }
        .options { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .opt-label { cursor: pointer; flex: 1; text-align: center; }
        .opt-label input { display: none; }
        .circle { display: block; width: 45px; height: 45px; line-height: 45px; border-radius: 50%; border: 2px solid #f3f4f6; background: white; font-weight: 800; color: #9ca3af; transition: 0.2s; margin: 0 auto; }
        .opt-label input:checked + .circle { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.1); }
        .hint { font-size: 0.8rem; color: #9ca3af; width: 70px; text-align: center; font-weight: 600; }

        #result-section { display: none; margin-top: 40px; }
        .report-box { background: white; padding: 35px; border-radius: 24px; border: 1px solid #e5e7eb; }
        .mbti-card { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 40px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        .mbti-type { font-size: 4rem; font-weight: 900; letter-spacing: -2px; margin: 10px 0; }
        
        .btn-analyze { background: #111827; color: white; border: none; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-analyze:hover { background: var(--primary); }
        .btn-save { background: #f9fafb; border: 1px solid #d1d5db; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 15px; float: right; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MBTI 성격 아키타입 찾기</h1>
        <p>20개의 핵심 문항을 통해 당신의 16가지 성격 유형을 분석합니다.</p>
    </header>

    <form id="quiz-form">
        <div id="quiz-container"></div>
        <button type="submit" class="btn-analyze">나의 MBTI 분석하기</button>
    </form>

    <section id="result-section">
        <button class="btn-save" id="download-btn">리포트 저장하기</button>
        <div class="report-box" id="report-capture">
            <div class="mbti-card">
                <div style="font-size: 1.1rem; font-weight: 600; opacity: 0.9;">YOUR MBTI TYPE</div>
                <div class="mbti-type" id="display-type">ISTJ</div>
                <h2 id="arch-name" style="margin: 0; font-size: 1.5rem;">신중한 관리자</h2>
                <p id="arch-desc" style="opacity: 0.8; margin-top: 15px; line-height: 1.6;"></p>
            </div>

            <h3>4대 지표 분석 결과</h3>
            <canvas id="mbtiBarChart" height="150"></canvas>
            
            <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="background:#f9fafb; padding:20px; border-radius:15px; text-align:center;">
                    <h4>성격 균형 (Radar)</h4>
                    <canvas id="mbtiRadarChart"></canvas>
                </div>
                <div style="background:#f9fafb; padding:20px; border-radius:15px;">
                    <h4 style="margin-top:0;">핵심 키워드</h4>
                    <ul id="keyword-list" style="padding-left:20px; line-height:2;"></ul>
                </div>
            </div>
        </div>
    </section>
</div>

<script>
    // MBTI 측정 문항 (E/I, S/N, T/F, J/P 각 5문항씩)
    const questions = [
        { dim: 'EI', txt: '처음 보는 사람들에게 먼저 말을 거는 편이다.' },
        { dim: 'SN', txt: '구체적이고 현실적인 사실에 더 집중하는 편이다.' },
        { dim: 'TF', txt: '결정을 내릴 때 논리적인 이유가 감정보다 더 중요하다.' },
        { dim: 'JP', txt: '여행을 갈 때 시간 단위로 꼼꼼하게 계획을 세운다.' },
        { dim: 'EI', txt: '혼자 시간을 보내기보다 사람들과 어울릴 때 에너지가 생긴다.' },
        { dim: 'SN', txt: '비유나 상징보다는 눈에 보이는 그대로를 믿는다.' },
        { dim: 'TF', txt: '친구가 힘들어할 때 해결책을 제시하기보다 공감을 먼저 한다. (역)' },
        { dim: 'JP', txt: '마감 기한이 닥쳐서 몰아서 하기보다 미리미리 끝내놓는다.' },
        { dim: 'EI', txt: '여러 사람의 관심이 나에게 쏟아지는 것이 즐겁다.' },
        { dim: 'SN', txt: '미래의 가능성보다 현재의 실용적인 이득이 더 중요하다.' },
        { dim: 'TF', txt: '진실을 말하는 것이 상대의 기분을 맞추는 것보다 중요하다.' },
        { dim: 'JP', txt: '주변 환경(책상 등)이 항상 정리정돈 되어 있어야 마음이 편하다.' },
        { dim: 'EI', txt: '주말에는 집에서 쉬는 것보다 밖으로 나가는 것이 좋다.' },
        { dim: 'SN', txt: '상상력이 풍부하다는 말을 자주 듣는다. (역)' },
        { dim: 'TF', txt: '원리원칙을 지키는 것이 예외를 두는 것보다 낫다고 생각한다.' },
        { dim: 'JP', txt: '계획이 갑자기 바뀌면 스트레스를 많이 받는 편이다.' },
        { dim: 'EI', txt: '모임에서 주로 이야기를 듣기보다 주도적으로 하는 편이다.' },
        { dim: 'SN', txt: '아이디어를 낼 때 현실 가능성을 가장 먼저 고려한다.' },
        { dim: 'TF', txt: '비판을 들었을 때 감정적으로 상처받기보다 분석하려고 한다.' },
        { dim: 'JP', txt: '자유롭고 즉흥적인 삶보다 질서 있는 삶을 선호한다.' }
    ];

    const container = document.getElementById('quiz-container');
    questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <span class="q-text">${i+1}. ${q.txt}</span>
            <div class="options">
                <div class="hint">그렇지 않다</div>
                ${[1,2,3,4,5].map(v => `<label class="opt-label"><input type="radio" name="q${i}" value="${v}" required><span class="circle">${v}</span></label>`).join('')}
                <div class="hint">정말 그렇다</div>
            </div>
        `;
        container.appendChild(div);
    });

    document.getElementById('quiz-form').onsubmit = function(e) {
        e.preventDefault();
        const data = new FormData(this);
        let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
        
        questions.forEach((q, i) => {
            let val = parseInt(data.get('q'+i));
            // '공감을 먼저 한다' 같은 문항은 역채점 처리 (예시 로직)
            if(q.txt.includes('(역)')) val = 6 - val;
            scores[q.dim] += val;
        });

        const type = (scores.EI > 15 ? 'E':'I') + (scores.SN > 15 ? 'S':'N') + (scores.TF > 15 ? 'T':'F') + (scores.JP > 15 ? 'J':'P');
        showResult(type, scores);
    };

    function showResult(type, scores) {
        document.getElementById('quiz-form').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('display-type').innerText = type;

        // 유형별 아키타입 정의
        const archetypes = {
            ISTJ: ["신중한 관리자", "철저하고 현실적이며 약속을 반드시 지키는 사람"],
            ENFP: ["재기발랄한 활동가", "열정적이고 창의적이며 항상 웃을 거리를 찾아내는 사람"],
            INFJ: ["선의의 옹호자", "차분하고 신비하며 영감을 주는 이상주의자"],
            ESTP: ["모험을 즐기는 사업가", "직설적이고 활발하며 문제를 즉각 해결하는 능력자"]
            // (나머지 유형도 동일하게 확장 가능)
        };
        const res = archetypes[type] || ["당당한 탐험가", "자신만의 길을 개척하며 세상을 변화시키는 사람"];
        document.getElementById('arch-name').innerText = res[0];
        document.getElementById('arch-desc').innerText = res[1];

        // 바 차트 (E vs I 등 비율 시각화)
        new Chart(document.getElementById('mbtiBarChart'), {
            type: 'bar',
            data: {
                labels: ['E-I(에너지)', 'S-N(인식)', 'T-F(판단)', 'J-P(생활)'],
                datasets: [{
                    data: [scores.EI, scores.SN, scores.TF, scores.JP],
                    backgroundColor: ['#fbbf24', '#34d399', '#f87171', '#60a5fa']
                }]
            },
            options: { indexAxis: 'y', scales: { x: { max: 25, min: 5 } }, plugins: { legend: { display: false } } }
        });

        // 레이더 차트
        new Chart(document.getElementById('mbtiRadarChart'), {
            type: 'radar',
            data: {
                labels: ['외향성', '현실감', '논리성', '계획성'],
                datasets: [{
                    data: [scores.EI, scores.SN, scores.TF, scores.JP],
                    borderColor: '#6366f1', backgroundColor: 'rgba(99, 102, 241, 0.2)'
                }]
            },
            options: { scales: { r: { max: 25, min: 5, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });

        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    document.getElementById('download-btn').onclick = function() {
        html2canvas(document.getElementById('report-capture')).then(canvas => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL();
            a.download = 'mbti-report.png';
            a.click();
        });
    };
</script>

</body>
</html>
